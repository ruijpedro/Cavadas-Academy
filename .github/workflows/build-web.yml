name: Build WebApp

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract project
        run: |
          rm -rf build_src
          mkdir build_src
          unzip -o Cavadas_Academy_Android_Project.zip -d build_src
          PROJECT_DIR=$(find build_src -name package.json -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          cd "$PROJECT_DIR"
          npm install

      - name: Build WebApp
        run: |
          cd "$PROJECT_DIR"
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PROJECT_DIR }}/dist

  deploy:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
