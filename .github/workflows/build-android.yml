name: Build 2YOU Academy APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: sudo apt-get update && sudo apt-get install -y unzip
      - run: |
          rm -rf build_src
          mkdir build_src
          unzip -o Cavadas_Academy_Android_Project.zip -d build_src
          find build_src -maxdepth 4 -type f | head -100
      - run: |
          PROJECT_DIR=$(find build_src -name package.json -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
      - run: cd "$PROJECT_DIR" && npm install
      - run: cd "$PROJECT_DIR" && npm run build
      - run: cd "$PROJECT_DIR" && npm install @capacitor/core @capacitor/cli @capacitor/android
      - run: cd "$PROJECT_DIR" && if [ ! -d "android" ]; then npx cap add android; fi
      - run: cd "$PROJECT_DIR" && npx cap sync android
      - run: cd "$PROJECT_DIR/android" && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: TwoYouAcademy-APK
          path: build_src/**/android/app/build/outputs/apk/debug/*.apk
