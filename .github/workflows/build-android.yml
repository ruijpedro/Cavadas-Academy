name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract Project
        run: |
          rm -rf build_src
          mkdir build_src
          unzip -o Cavadas_Academy_GitHub.zip -d build_src
          echo "=== PROJECT CONTENT ==="
          find build_src -type f | head -100

      - name: Find package.json
        run: |
          PROJECT_DIR=$(find build_src -name package.json -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project found in: $PROJECT_DIR"

      - name: Install Dependencies
        run: |
          cd "$PROJECT_DIR"
          npm install

      - name: Build Web App
        run: |
          cd "$PROJECT_DIR"
          npm run build

      - name: Install Capacitor
        run: |
          cd "$PROJECT_DIR"
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Sync Android
        run: |
          cd "$PROJECT_DIR"
          npx cap sync android

      - name: Build APK
        run: |
          cd "$PROJECT_DIR/android"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CavadasAcademy-APK
          path: |
            build_src/**/android/app/build/outputs/apk/debug/*.apk
