name: Build Cavadas Academy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Extract Project ZIP
        run: |
          rm -rf build_src
          mkdir build_src
          unzip -o Cavadas_Academy_Android_Project.zip -d build_src
          echo "Conteúdo extraído:"
          find build_src -maxdepth 4 -type f | head -100

      - name: Find Project Folder
        run: |
          PROJECT_DIR=$(find build_src -name package.json -exec dirname {} \; | head -1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERRO: package.json não encontrado dentro do ZIP."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Projeto encontrado em: $PROJECT_DIR"

      - name: Install Dependencies
        run: |
          cd "$PROJECT_DIR"
          npm install

      - name: Build Web App
        run: |
          cd "$PROJECT_DIR"
          npm run build

      - name: Add Android Platform
        run: |
          cd "$PROJECT_DIR"
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: |
          cd "$PROJECT_DIR"
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR/android"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Cavadas-Academy-APK
          path: |
            build_src/**/android/app/build/outputs/apk/debug/*.apk
