name: Build Cavadas Academy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: BUILD_TARGET=android npm run build

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Android
        run: npx cap sync android

      - name: Apply Android Launcher Icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26

          cp public/icon-192.png android/app/src/main/res/drawable/icon.png

          cp public/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cp public/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          cat > android/app/src/main/res/drawable/ic_launcher_background.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#FFFFFF" />
          </shape>
          EOF

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/icon"/>
          </adaptive-icon>
          EOF

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/icon"/>
          </adaptive-icon>
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CavadasAcademy-APK
          path: android/app/build/outputs/apk/debug/*.apk
